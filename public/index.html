<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>ERGONOMICS</title>

    <!-- Bootstrap 5 CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 CSS via CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css">

    <!-- Theme CSS -->
    <link href="css/grayscale.css" rel="stylesheet">

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

</head>

<body id="page-top" data-spy="scroll" data-target=".navbar-fixed-top">

    <nav class="navbar navbar-custom navbar-fixed-top" role="navigation" style="display:none">
    </nav>

    <section id="main" style="padding-top:30px" class="container content-section text-center">
        <div class="row">
            <h1 style="font-size: 58px; margin-bottom:10px">Welcome</h1>
            <h2> to the<br>ergoconference experience</h2>
            <br>
            <div class="row">
                <input id="mail" style="color:black; font-weight: 500; width: 250px; margin: auto; margin-bottom: 20px; margin-top: 40px;" placeholder="e-mail">
            </div>
            <br>
            <div class="row">
                <img id="captcha-img" src="/img/captacha-init.png" style="width: 280px; margin: auto; margin-bottom: 20px; cursor: pointer;">
            </div>
            <br>
            <div class="row">
                <button id="btn-login" class="btn btn-default disabled" onclick="sendMail()" style="margin: auto; width: 80px;">LOGIN</button>
            </div>
        </div>
    </section>

    <!-- Bootstrap 5 JavaScript Bundle via CDN (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Theme JavaScript -->
    <script src="js/grayscale.js"></script>

    <script>

    document.addEventListener("DOMContentLoaded", function(event) {

        document.getElementById("captcha-img").onclick = function (e) {
            document.getElementById("captcha-img").src = "/img/captacha.gif";
            
            // 5 seconds later
            setTimeout(function(){
                document.getElementById("btn-login").classList.remove("disabled");
            },5000);

        };

    });
    
    // --- Variables globales ---
    let ws;

    // --- Connect WebSocket ---
    function connectToWS() {
        ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/wss");

        ws.onopen = () => console.log("Connected to WS server");
        ws.onerror = (err) => console.error("WS Error:", err);

        ws.onmessage = (e) => {
            console.log("WS message:", e.data);
            try {
                const msg = JSON.parse(e.data);
                if(msg.type === "mailAck") {
                    console.log("Server acknowledged mail:", msg.status);
                }
            } catch {}
        };

        ws.onclose = () => {
            console.warn("WS closed, reconnecting in 1s...");
            setTimeout(connectToWS, 1000);
        };
    }
    connectToWS();

    // --- Envoi de mail via WS ---
    function sendMail() {
        const mailValue = document.getElementById("mail").value;
        if(!ws || ws.readyState !== WebSocket.OPEN) {
            console.warn("WS not open, cannot send mail");
            return;
        }

        ws.send(JSON.stringify({ type: "mail", mail: mailValue }));
        console.log("Mail sent via WS:", mailValue);

        // Redirection
        window.location.href = '/ergoconf.html';
    }
    </script>

</body>

</html>
