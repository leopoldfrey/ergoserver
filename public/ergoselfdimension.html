    <script>

// --- Variables globales ---
let ws;
let oldStage = -1;

// --- Connect WebSocket ---
function connectToWS() {
    ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/wss");

    ws.onopen = () => console.log("Connected to WS server");
    ws.onerror = (err) => console.error("WS Error:", err);
    ws.onmessage = (e) => console.log("WS message:", e.data);

    // Reconnect automatically
    ws.onclose = () => {
        console.warn("WS closed, reconnecting in 1s...");
        setTimeout(connectToWS, 1000);
    };
}
connectToWS();

// --- Buttons ---
document.getElementById("btn-click-photo").onclick = clickPhotoButton;
document.getElementById("btn-click-share").onclick = clickPhotoButton;

document.getElementById("btn-click-photo-os").onchange = (event) => resizeAndUpload(event.target.files[0]);

function clickPhotoButton() {
    document.getElementById("btn-click-photo-os").click();
}

// --- Image processing ---
function resizeAndUpload(file) {
    if (!file) return;

    loadImage(
        file,
        function (canvas) {
            const resultDiv = document.getElementById("imgResultDiv");
            canvas.classList.add("img-result");
            resultDiv.insertBefore(canvas, resultDiv.firstChild);

            const dataURL = canvas.toDataURL("image/jpeg");
            const blob = dataURLToBlob(dataURL);
            sendBinary(blob, file.name);

            // Reset input to allow same file selection again
            document.getElementById("btn-click-photo-os").value = null;
        },
        { maxWidth: 1000, canvas: true, orientation: true }
    );
}

// --- Convert DataURL to Blob ---
function dataURLToBlob(dataURL) {
    const BASE64_MARKER = ';base64,';
    if (dataURL.indexOf(BASE64_MARKER) === -1) {
        const parts = dataURL.split(',');
        const contentType = parts[0].split(':')[1];
        const raw = parts[1];
        return new Blob([raw], { type: contentType });
    }

    const parts = dataURL.split(BASE64_MARKER);
    const contentType = parts[0].split(':')[1];
    const raw = atob(parts[1]);
    const rawLength = raw.length;
    const uInt8Array = new Uint8Array(rawLength);
    for (let i = 0; i < rawLength; ++i) uInt8Array[i] = raw.charCodeAt(i);
    return new Blob([uInt8Array], { type: contentType });
}

// --- Send binary image via WebSocket ---
function sendBinary(blob, filename) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        console.warn("WS not open, cannot send image");
        return;
    }

    const header = { type: "uploadImage", name: filename.replace(/\s+/g, "_"), stage: oldStage };
    const headerJson = JSON.stringify(header);
    const encoder = new TextEncoder();
    const headerBuffer = encoder.encode(headerJson);

    // 4 bytes Big Endian for header length
    const headerLengthBuffer = new ArrayBuffer(4);
    new DataView(headerLengthBuffer).setUint32(0, headerBuffer.byteLength, false);

    const reader = new FileReader();
    reader.onload = (e) => {
        const imageBuffer = e.target.result;
        const combined = new Uint8Array(4 + headerBuffer.byteLength + imageBuffer.byteLength);
        combined.set(new Uint8Array(headerLengthBuffer), 0);
        combined.set(headerBuffer, 4);
        combined.set(new Uint8Array(imageBuffer), 4 + headerBuffer.byteLength);
        ws.send(combined.buffer);
        console.log("Image sent via WS:", filename);
    };
    reader.readAsArrayBuffer(blob);
}

// --- WebSocket message helpers ---
function setClientsWS(stage) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        console.warn("WS not open, cannot send stage");
        return;
    }

    const messageToSend = stage === 0 ? document.getElementById("text-to-send").innerHTML : "";
    ws.send(JSON.stringify({ type: "broadcast", stage, standbyMsg: messageToSend }));
    oldStage = stage;
}

function deleteAllServerData() {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        console.warn("WS not open, cannot delete data");
        return;
    }

    ws.send(JSON.stringify({ type: "deleteAllServerData" }));
}

// --- Optional: auto reconnect on visibility change ---
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && (!ws || ws.readyState === WebSocket.CLOSED)) {
        connectToWS();
    }
});

    </script>
