    <script>

    let ws;
let oldStage = -1;
const wsServer = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;

// ------------------- INIT -------------------
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("btn-click-photo").onclick = clickPhotoButton;
    document.getElementById("btn-click-share").onclick = clickPhotoButton;

    if (window.File && window.FileReader) {
        document.getElementById("btn-click-photo-os").onchange = (e) => uploadFilesWS(e.target.files);
    }

    connectToWS();
});

// ------------------- WEBSOCKET -------------------
function connectToWS() {
    ws = new WebSocket(wsServer);
    ws.binaryType = "arraybuffer";

    ws.onopen = () => ws.send(JSON.stringify({ type: "getInit" }));

    ws.onmessage = (event) => {
        try {
            const msg = typeof event.data === "string" ? JSON.parse(event.data) : null;
            if (!msg) return;
            if (msg.type === "changeState" || msg.type === "initState") setStage(msg.stage, msg.standbyMsg);
            if (msg.type === "newimage") displayImage(msg.standbyMsg);
        } catch {}
    };

    ws.onerror = console.error;
    ws.onclose = () => setTimeout(connectToWS, 2000);
}

function checkWS() {
    if (!ws || ws.readyState === WebSocket.CLOSED) connectToWS();
}

function clickPhotoButton() { document.getElementById("btn-click-photo-os").click(); }

// ------------------- IMAGE UPLOAD WS BINAIRE -------------------
function uploadFilesWS(files) {
    const MAX_WIDTH = 1000;
    const MAX_HEIGHT = 1000;
    const QUALITY = 0.7;

    for (let file of files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            // Redimensionner + compression
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > MAX_WIDTH) { h = (MAX_WIDTH / w) * h; w = MAX_WIDTH; }
                if (h > MAX_HEIGHT) { w = (MAX_HEIGHT / h) * w; h = MAX_HEIGHT; }

                const canvas = document.createElement("canvas");
                canvas.width = w; canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);

                // Ajouter sur page
                const resultDiv = document.getElementById("imgResultDiv");
                canvas.classList.add("img-result");
                resultDiv.insertBefore(canvas, resultDiv.firstChild);

                canvas.toBlob((blob) => {
                    const reader2 = new FileReader();
                    reader2.onload = (ev) => sendBinary(blob, file.name);
                    reader2.readAsArrayBuffer(blob);
                }, "image/jpeg", QUALITY);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
}

function sendBinary(blob, filename) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        console.warn("WebSocket not open, cannot send image");
        return;
    }

    try {
        // Préparer le header JSON
        const header = { type: "uploadImage", name: filename.replace(/\s+/g, "_"), stage: oldStage };
        const headerJson = JSON.stringify(header);
        const encoder = new TextEncoder();
        const headerBuffer = encoder.encode(headerJson);

        // Buffer de 4 octets pour la longueur du header (Big Endian)
        const headerLengthBuffer = new ArrayBuffer(4);
        const view = new DataView(headerLengthBuffer);
        view.setUint32(0, headerBuffer.byteLength, false); // false = Big Endian

        const reader = new FileReader();
        reader.onload = (e) => {
            const imageBuffer = e.target.result;

            // Concaténer [4 bytes header length][header JSON][image]
            const combined = new Uint8Array(4 + headerBuffer.byteLength + imageBuffer.byteLength);
            combined.set(new Uint8Array(headerLengthBuffer), 0);
            combined.set(headerBuffer, 4);
            combined.set(new Uint8Array(imageBuffer), 4 + headerBuffer.byteLength);

            // Envoyer via WebSocket
            ws.send(combined.buffer);
            console.log("Image sent:", filename, "Header length:", headerBuffer.byteLength);
        };

        reader.onerror = (err) => {
            console.error("Error reading image blob:", err);
        };

        reader.readAsArrayBuffer(blob);

    } catch (err) {
        console.error("Error in sendBinary:", err);
    }
}

// ------------------- STAGE / UI -------------------
function setStage(stage, standbyMsg) {
    switch (parseInt(stage)) {
        case 0:
            document.getElementById("section-standBy").style.display = "";
            document.getElementById("section-protocol").style.display = "none";
            document.getElementById("msg-standby").innerHTML = standbyMsg;
            break;
        default:
            if (oldStage != stage) {
                document.getElementById("section-standBy").style.display = "none";
                document.getElementById("section-protocol").style.display = "";
                document.getElementById("protocol-id").innerHTML = stage;
                const imgResultDiv = document.getElementById("imgResultDiv");
                while (imgResultDiv.firstChild) imgResultDiv.removeChild(imgResultDiv.firstChild);
            }
            break;
    }
    oldStage = stage;
}

// ------------------- DISPLAY IMAGE -------------------
function displayImage(filename) {
    const imgResultDiv = document.getElementById("imgResultDiv");
    const img = document.createElement("img");
    img.src = "/uploads/" + filename;
    img.classList.add("img-result");
    imgResultDiv.insertBefore(img, imgResultDiv.firstChild);
}

// ------------------- VISIBILITY / FOCUS -------------------
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") { checkWS(); setTimeout(checkWS, 3000); } });
window.addEventListener("focus", () => { checkWS(); setTimeout(checkWS, 3000); });

    </script>
