<style>
	.btn-controler {
		margin: auto;
		width: 150px;
	}
	#text-to-send {

		margin:20px; padding:20px; background-color: white; color: black; border-radius: 17px;
	}
	#text-to-send:focus {
		outline: none;
		box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
		border-color: #007bff;
	}
	#text-to-send::selection {
		background-color: red;
	}
</style>

<body id="page-top" data-spy="scroll" data-target=".navbar-fixed-top">

		<nav class="navbar navbar-custom navbar-fixed-top" role="navigation" style="display:none">
	    </nav>
		

		<section id="main" style="padding-top:30px" class="container content-section text-center">
        <div class="row">
    		<h1 style="font-size: 58px; margin-bottom:10px">ERGOCONTROLLER</h1>
        </div>
		<div class="row">
    		<input type="text" id="text-to-send" value="FOCUS ON THE CONFERENCE">
		</div>
		<div class="row" style="display: grid; grid-row-gap: 20px;">
			<!--button onclick="setClientsWS(0)">Pause</button-->
			<button class="btn btn-default btn-controler" onclick="deleteAllServerData()">Delete ALL DATA!</button>
			<button class="btn btn-default btn-controler" onclick="setClientsWS(0)">Pause</button>
			<button class="btn btn-default btn-controler" onclick="setClientsWS(1)">Protocol 1</button>
			<button class="btn btn-default btn-controler" onclick="setClientsWS(2)">Protocol 2</button>
			<button class="btn btn-default btn-controler" onclick="setClientsWS(3)">Protocol 3</button>
			<button class="btn btn-default btn-controler" onclick="setClientsWS(4)">Protocol 4</button>
			<button class="btn btn-default btn-controler" onclick='ws.send(JSON.stringify({type:"broadcast", stage:0, standbyMsg:"TEST"}))'>Test WS</button>
		</div>
		<div class="row" style="display: grid; grid-row-gap: 20px;">
		</div>

	<!-- Bootstrap 5 JavaScript Bundle via CDN (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Theme JavaScript -->
    <script src="js/grayscale.js"></script>

	<script>
		var ws;
		var wsServer = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;
		console.log("Socket Server: " + wsServer);

		var tts = document.getElementById("text-to-send");
		tts.addEventListener("click", function() {
			console.log("Text to send clicked, selecting text");
			tts.select();
		});

		document.addEventListener("DOMContentLoaded", function(event) {
			ws = new WebSocket(wsServer);

			ws.onopen = function(event) {
				console.log("Connected to ws server");
			};

			ws.onerror = function(error) {
				console.error("WebSocket Error", error);
			};

			ws.onmessage = function(e) {
				console.log("Received message:", e.data);
			};
		});

		function setClientsWS(stage) {
			if (!ws || ws.readyState !== WebSocket.OPEN) {
				console.log("No ws connection!");
				return;
			}

			let messageToSend = stage === 0 ? document.getElementById("text-to-send").value : "";

			ws.send(JSON.stringify({
				type: "broadcast",
				stage: stage,
				standbyMsg: messageToSend
			}));
		}

		function deleteAllServerData() {
			if (!ws || ws.readyState !== WebSocket.OPEN) {
				console.log("No ws connection!");
				return;
			}

			ws.send(JSON.stringify({ type: "deleteAllServerData" }));
		}
	
	</script>
	</body>
