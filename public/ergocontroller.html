<html>
	<head>
		<!--script src="js/osc.min.js"></script-->
	</head>
	<body style="width: 100%; height: 100%">
		Listening to clients
		<div id="text-to-send" contenteditable="true">FOCUS ON THE CONFERENCE</div>
		<div>
			<!--button onclick="setClientsWS(0)">Pause</button-->
			<button onclick="deleteAllServerData()">Delete ALL DATA!</button>
			<button onclick="setClientsWS(0)">Pause</button>
			<button onclick="setClientsWS(1)">Protocol 1</button>
			<button onclick="setClientsWS(2)">Protocol 2</button>
			<button onclick="setClientsWS(3)">Protocol 3</button>
			<button onclick="setClientsWS(4)">Protocol 4</button>
			<button onclick='ws.send(JSON.stringify({type:"broadcast", stage:0, standbyMsg:"TEST"}))'>Test WS</button>
		</div>
		<script>
		</script>
	<script>
		var ws;
		var wsServer = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;
		console.log("Socket Server: " + wsServer);

		document.addEventListener("DOMContentLoaded", function(event) {
			ws = new WebSocket(wsServer);

			ws.onopen = function(event) {
				console.log("Connected to ws server");
			};

			ws.onerror = function(error) {
				console.error("WebSocket Error", error);
			};

			ws.onmessage = function(e) {
				console.log("Received message:", e.data);
			};
		});

		function setClientsWS(stage) {
			if (!ws || ws.readyState !== WebSocket.OPEN) {
				console.log("No ws connection!");
				return;
			}

			let messageToSend = stage === 0 ? document.getElementById("text-to-send").innerHTML : "";

			ws.send(JSON.stringify({
				type: "broadcast",
				stage: stage,
				standbyMsg: messageToSend
			}));
		}

		function deleteAllServerData() {
			if (!ws || ws.readyState !== WebSocket.OPEN) {
				console.log("No ws connection!");
				return;
			}

			ws.send(JSON.stringify({ type: "deleteAllServerData" }));
		}
	
	</script>
	</body>
</html>
